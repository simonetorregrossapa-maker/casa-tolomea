<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Gestione prenotazioni — Casa Tolomea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --c-bg:#faf6f0; --c-surface:#ffffff; --c-ink:#1f1d18; --c-muted:#6d685d;
    --c-line:#e7dccd; --c-accent:#a8472f; --c-accent-soft:#c46a4d; --c-accent-bg:#f6e7df;
    --c-olive:#4d5340; --c-olive-soft:#7c8466;
    --font-display:"Fraunces",Georgia,serif; --font-body:"Karla",system-ui,sans-serif;
    --radius:16px; --shadow-sm:0 2px 10px rgba(31,29,24,.06); --shadow-md:0 18px 50px -18px rgba(31,29,24,.28);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--c-bg);color:var(--c-ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:var(--font-display);font-weight:500;letter-spacing:-.01em;margin:0;}
  a{color:var(--c-accent);}
  .adm-wrap{max-width:960px;margin:0 auto;padding:28px 20px 80px;}

  .adm-top{text-align:center;margin-bottom:26px;}
  .adm-eyebrow{text-transform:uppercase;letter-spacing:.12em;font-size:.72rem;font-weight:700;color:var(--c-olive);}
  .adm-top h1{font-size:clamp(1.7rem,3.4vw,2.3rem);margin:6px 0;}
  .adm-top p{color:var(--c-muted);margin:0;font-size:.95rem;}

  .adm-demo-banner{background:var(--c-accent-bg);border:1px solid var(--c-line);border-radius:12px;padding:10px 16px;text-align:center;font-size:.86rem;color:var(--c-ink);margin-bottom:20px;}

  /* Login */
  .adm-login{max-width:360px;margin:30px auto;background:var(--c-surface);border:1px solid var(--c-line);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-sm);}
  .adm-login h2{font-size:1.4rem;margin-bottom:4px;}
  .adm-login label{display:block;font-size:.82rem;font-weight:600;margin:14px 0 5px;}
  .adm-login input{width:100%;padding:11px 13px;border:1px solid var(--c-line);border-radius:10px;background:var(--c-bg);font-family:var(--font-body);font-size:.95rem;}
  .adm-login input:focus{outline:2px solid var(--c-olive);outline-offset:1px;}
  .adm-login .adm-btn{width:100%;margin-top:18px;justify-content:center;}

  /* Buttons */
  .adm-btn{display:inline-flex;align-items:center;gap:.4rem;border:none;border-radius:100px;padding:11px 20px;font-family:var(--font-body);font-size:.9rem;font-weight:700;cursor:pointer;transition:transform .15s,background .15s;}
  .adm-btn-primary{background:var(--c-accent);color:#fff;}
  .adm-btn-primary:hover{background:#933c27;transform:translateY(-1px);}
  .adm-btn-ghost{background:transparent;color:var(--c-ink);border:1px solid var(--c-line);}
  .adm-btn-ghost:hover{background:var(--c-surface);}
  .adm-btn-sm{padding:8px 15px;font-size:.83rem;}

  /* Bar + tabs */
  .adm-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:22px;}
  .adm-tabs{display:inline-flex;background:var(--c-surface);border:1px solid var(--c-line);border-radius:100px;padding:4px;}
  .adm-tab{border:none;background:transparent;padding:9px 20px;border-radius:100px;font-family:var(--font-body);font-weight:700;font-size:.9rem;color:var(--c-muted);cursor:pointer;}
  .adm-tab.sel{background:var(--c-accent);color:#fff;}
  .adm-bar-right{display:flex;align-items:center;gap:8px;}
  .adm-demo-pill{background:var(--c-accent-bg);color:var(--c-accent);font-size:.76rem;font-weight:700;padding:6px 12px;border-radius:100px;}

  /* Stats */
  .adm-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
  @media(max-width:560px){.adm-stats{grid-template-columns:1fr;}}
  .adm-stat{background:var(--c-surface);border:1px solid var(--c-line);border-radius:14px;padding:16px 18px;}
  .adm-stat b{font-family:var(--font-display);font-size:1.9rem;font-weight:400;color:var(--c-accent);display:block;line-height:1;}
  .adm-stat span{font-size:.8rem;color:var(--c-muted);}

  /* Filters */
  .adm-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .adm-chip{border:1px solid var(--c-line);background:var(--c-surface);border-radius:100px;padding:7px 15px;font-family:var(--font-body);font-size:.83rem;font-weight:600;color:var(--c-muted);cursor:pointer;}
  .adm-chip.sel{background:var(--c-olive);color:#fff;border-color:var(--c-olive);}

  /* Cards */
  .adm-list{display:flex;flex-direction:column;gap:12px;}
  .adm-card{display:flex;justify-content:space-between;align-items:center;gap:16px;background:var(--c-surface);border:1px solid var(--c-line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm);}
  @media(max-width:560px){.adm-card{flex-direction:column;align-items:stretch;}}
  .adm-card-head{display:flex;align-items:center;gap:10px;margin-bottom:5px;font-size:1.05rem;}
  .adm-card-dates{font-size:.9rem;color:var(--c-ink);}
  .adm-card-contacts{font-size:.83rem;color:var(--c-muted);margin-top:4px;}
  .adm-card-note{font-size:.83rem;color:var(--c-muted);margin-top:6px;font-style:italic;}
  .adm-dot{color:var(--c-line);margin:0 4px;}
  .adm-card-actions{flex-shrink:0;}

  .adm-badge{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:100px;}
  .adm-badge.ok{background:#e7eedd;color:var(--c-olive);}
  .adm-badge.wait{background:var(--c-accent-bg);color:var(--c-accent);}

  .adm-empty{color:var(--c-muted);text-align:center;padding:30px;}
  .adm-muted{color:var(--c-muted);}

  /* Calendar */
  .adm-cal-head{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:14px;}
  .adm-cal-head h3{font-size:1.4rem;min-width:210px;text-align:center;}
  .adm-nav{border:1px solid var(--c-line);background:var(--c-surface);width:38px;height:38px;border-radius:50%;font-size:1.3rem;line-height:1;color:var(--c-ink);cursor:pointer;}
  .adm-nav:hover{background:var(--c-accent-bg);}
  .adm-legend{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;font-size:.82rem;color:var(--c-muted);}
  .adm-legend i.lg{display:inline-block;width:13px;height:13px;border-radius:4px;vertical-align:-1px;margin-right:5px;}
  .lg.site{background:var(--c-olive-soft);}
  .lg.booking{background:var(--c-accent-soft);}
  .lg.both{background:linear-gradient(135deg,var(--c-olive-soft) 50%,var(--c-accent-soft) 50%);}
  .lg.blocco{background:#8a8172;}
  .adm-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:var(--c-surface);border:1px solid var(--c-line);border-radius:16px;padding:16px;box-shadow:var(--shadow-sm);}
  .adm-wd{text-align:center;font-size:.74rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.05em;padding-bottom:4px;}
  .adm-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:.9rem;font-weight:600;color:var(--c-ink);background:var(--c-bg);}
  .adm-cell.empty{background:transparent;}
  .adm-cell.site{background:var(--c-olive-soft);color:#fff;}
  .adm-cell.booking{background:var(--c-accent-soft);color:#fff;}
  .adm-cell.both{background:linear-gradient(135deg,var(--c-olive-soft) 50%,var(--c-accent-soft) 50%);color:#fff;}
  .adm-cell.blocco{background:#8a8172;color:#fff;}
  .adm-cell.today{outline:2px solid var(--c-ink);outline-offset:-2px;}
  .adm-cal-foot{text-align:center;font-size:.82rem;margin-top:14px;}

  /* Incassi / provvigione */
  .adm-stats-4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:720px){.adm-stats-4{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:560px){.adm-stats-4{grid-template-columns:1fr;}}
  .adm-stat-accent{background:var(--c-accent-bg);border-color:var(--c-accent);}
  .adm-inc-pipeline{background:var(--c-surface);border:1px solid var(--c-line);border-radius:12px;padding:12px 16px;font-size:.92rem;margin-bottom:18px;}
  .adm-inc-head{display:flex;justify-content:space-between;align-items:center;padding:0 4px 8px;font-size:.78rem;font-weight:700;color:var(--c-muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--c-line);}
  .adm-inc-cols{display:flex;gap:26px;}
  .adm-inc-cols b{color:var(--c-accent);}
  .adm-inc-list{display:flex;flex-direction:column;}
  .adm-inc-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:12px 4px;border-bottom:1px solid var(--c-line);}
  .adm-inc-when{display:flex;flex-direction:column;gap:3px;}
  .adm-inc-when .adm-muted{font-size:.82rem;}
  .adm-inc-money{display:flex;gap:26px;align-items:baseline;flex-shrink:0;}
  .adm-inc-money b{color:var(--c-accent);font-weight:700;min-width:64px;text-align:right;}
  .adm-inc-money span{color:var(--c-muted);min-width:64px;text-align:right;}

  /* Blocco manuale */
  .adm-block-box{background:var(--c-surface);border:1px solid var(--c-line);border-radius:16px;padding:20px 22px;margin-top:22px;box-shadow:var(--shadow-sm);}
  .adm-block-box h3{font-size:1.25rem;}
  .adm-block-form{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
  .adm-block-form label{display:flex;flex-direction:column;font-size:.8rem;font-weight:600;color:var(--c-muted);gap:5px;flex:1;min-width:130px;}
  .adm-block-form input{padding:10px 12px;border:1px solid var(--c-line);border-radius:10px;background:var(--c-bg);font-family:var(--font-body);font-size:.92rem;color:var(--c-ink);}
  .adm-block-form input:focus{outline:2px solid var(--c-olive);outline-offset:1px;}
  .adm-block-form .adm-btn{flex:0 0 auto;}
  .adm-blocco-list{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
  .adm-blocco-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 14px;background:var(--c-bg);border:1px solid var(--c-line);border-radius:10px;font-size:.88rem;}
  .adm-blocco-row em{color:var(--c-muted);font-style:italic;}

  /* Messaggi ai clienti */
  .adm-msg{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;}
  @media(max-width:820px){.adm-msg{grid-template-columns:1fr;}}
  .adm-msg-box{background:var(--c-surface);border:1px solid var(--c-line);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow-sm);}
  .adm-msg-box h3{font-size:1.2rem;margin-bottom:4px;}
  .adm-msg-box .adm-muted{font-size:.85rem;margin-bottom:14px;}
  .adm-seg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .adm-recipients{max-height:340px;overflow:auto;border:1px solid var(--c-line);border-radius:12px;background:var(--c-bg);}
  .adm-recip-row{display:flex;align-items:center;gap:11px;padding:9px 14px;border-bottom:1px solid var(--c-line);font-size:.9rem;cursor:pointer;}
  .adm-recip-row:last-child{border-bottom:none;}
  .adm-recip-row:hover{background:var(--c-surface);}
  .adm-recip-row input{width:17px;height:17px;accent-color:var(--c-olive);flex:none;}
  .adm-recip-main{display:flex;flex-direction:column;line-height:1.3;min-width:0;}
  .adm-recip-main b{font-weight:700;}
  .adm-recip-main span{color:var(--c-muted);font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .adm-recip-tag{margin-left:auto;flex:none;font-size:.72rem;font-weight:700;color:var(--c-olive);background:var(--c-bg);border:1px solid var(--c-line);border-radius:100px;padding:2px 9px;}
  .adm-msg-form label{display:block;font-size:.8rem;font-weight:700;color:var(--c-muted);margin:12px 0 5px;}
  .adm-msg-form input,.adm-msg-form textarea{width:100%;padding:11px 13px;border:1px solid var(--c-line);border-radius:11px;background:var(--c-bg);font-family:var(--font-body);font-size:.94rem;color:var(--c-ink);}
  .adm-msg-form textarea{min-height:170px;resize:vertical;line-height:1.55;}
  .adm-msg-form input:focus,.adm-msg-form textarea:focus{outline:2px solid var(--c-olive);outline-offset:1px;}
  .adm-msg-count{font-size:.85rem;color:var(--c-ink);margin:6px 0 0;}
  .adm-msg-count b{color:var(--c-accent);}
  .adm-msg-send{margin-top:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .adm-msg-preview{margin-top:14px;border:1px dashed var(--c-line);border-radius:12px;padding:16px;background:var(--c-bg);font-size:.9rem;line-height:1.6;}
  .adm-msg-preview .pv-h{font-family:var(--font-display);color:var(--c-accent);font-size:1.05rem;margin-bottom:8px;}
  .adm-msg-preview .pv-sign{margin-top:12px;color:var(--c-muted);}

  /* Toast */
  .adm-toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);background:var(--c-ink);color:#fff;padding:12px 20px;border-radius:100px;font-size:.88rem;font-weight:600;box-shadow:var(--shadow-md);opacity:0;transition:opacity .3s,transform .3s;z-index:99;max-width:90vw;text-align:center;}
  .adm-toast.show{opacity:1;transform:translate(-50%,0);}
  .adm-toast.err{background:#8f2f22;}
  .adm-toast.warn{background:var(--c-accent);}
</style>
</head>
<body>
  <div class="adm-wrap">
    <div class="adm-top">
      <div class="adm-eyebrow">Area riservata · proprietario</div>
      <h1>Gestione prenotazioni</h1>
      <p>Conferma le richieste dal sito e tieni sotto controllo il calendario, sincronizzato con Booking.</p>
    </div>
    <div class="adm-demo-banner" id="admDemoBanner" hidden>
      Modalità dimostrativa: dati di esempio. Collega Supabase in <code>config.js</code> per usarlo dal vivo.
    </div>
    <div id="admRoot"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
